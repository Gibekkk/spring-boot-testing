version: '3'
services:

  app:
    build: .
    container_name: spring-boot-testing-app
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-db:27017/product-service
    depends_on:
      - mongo-db
    networks:
      - app-network
    restart: unless-stopped

  mongo-db:
    container_name: mongo-db
    image: mongo:4.4.29-focal
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
